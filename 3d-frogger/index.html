<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>3D Frogger</title>
    <link rel="icon" type="image/svg+xml" href="/Mark-e-Mark/3d-frogger/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/Mark-e-Mark/3d-frogger/assets/index-D5KrJnXb.js"></script>
    <link rel="stylesheet" crossorigin href="/Mark-e-Mark/3d-frogger/assets/index-D8CjJTX1.css">
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>

      <div id="hud">
        <div class="hud-top">
          <div class="stat">
            <span class="label">Score</span>
            <span id="score">0</span>
          </div>
          <div class="stat">
            <span class="label">Level</span>
            <span id="level">1</span>
          </div>
          <div class="stat">
            <span class="label">High</span>
            <span id="high">0</span>
          </div>
        </div>
        <div class="hud-bottom">
          <div id="lives" class="lives"></div>
          <div class="timer-wrap">
            <div class="timer-label">TIME</div>
            <div class="timer-bar"><div id="timer-fill"></div></div>
          </div>
        </div>
      </div>

      <div id="touch-pad" class="touch-pad" aria-hidden="true">
        <button data-dir="up" class="touch-btn touch-up" type="button">▲</button>
        <button data-dir="left" class="touch-btn touch-left" type="button">◀</button>
        <button data-dir="down" class="touch-btn touch-down" type="button">▼</button>
        <button data-dir="right" class="touch-btn touch-right" type="button">▶</button>
      </div>

      <div id="overlay" class="overlay">
        <div class="panel">
          <p class="eyebrow">Konami classic · reimagined</p>
          <h1>3D FROGGER</h1>
          <p class="tagline">Cross the road. Ride the river. Fill every home.</p>
          <ul class="howto">
            <li><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or <kbd>WASD</kbd> to hop</li>
            <li>On mobile: swipe or use the pad</li>
            <li>Fill all five homes before time runs out</li>
          </ul>
          <button id="start-btn" class="cta" type="button">Start Game</button>
          <p class="hint">Click once to enable sound</p>
          <p class="hint"><a id="all-apps" href="../">All Apps</a></p>
        </div>
      </div>

      <div id="message" class="message hidden"></div>
    </div>
  </body>
</html>
